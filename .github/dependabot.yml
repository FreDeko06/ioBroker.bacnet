# Dependabot will run on day 4 of each month at 03:48 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "48 3 4 * *"
    open-pull-requests-limit: 15
    assignees:
      - "FreDeko06"
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "48 3 4 * *"
    open-pull-requests-limit: 15
    assignees:
      - "FreDeko06"
